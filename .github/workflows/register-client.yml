name: Register a client

on:
  issues:
    types: [opened, edited, labeled]

permissions:
  contents: write
  issues: write

jobs:
  process:
    if: contains(github.event.issue.labels.*.name, 'client-registration')
    runs-on: ubuntu-latest
    steps:
      - name: Check author association
        id: gate
        env:
          ASSOC: ${{ github.event.issue.author_association }}
        run: |
          case "$ASSOC" in
            OWNER|MEMBER|COLLABORATOR) echo "allowed=true" >> "$GITHUB_OUTPUT" ;;
            *) echo "allowed=false" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Comment when blocked
        if: steps.gate.outputs.allowed == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
              body: `Client registration must be opened or labelled by a repository collaborator.`,
            });

      - uses: actions/checkout@v4
        if: steps.gate.outputs.allowed == 'true'
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Write issue body to file
        if: steps.gate.outputs.allowed == 'true'
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          mkdir -p .tmp
          printf '%s' "$ISSUE_BODY" > .tmp/issue-body.md

      - name: Mint key and email
        id: register
        if: steps.gate.outputs.allowed == 'true'
        env:
          ISSUE_BODY_PATH: .tmp/issue-body.md
          REPO_ROOT: ${{ github.workspace }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
        run: |
          OUTPUT="$(node .github/scripts/register-client.mjs)"
          # Do NOT echo the full output; it would expose the plaintext key.
          # The script never includes the plaintext in its JSON, but keep
          # the result write-only as defence in depth.
          echo "result<<EOF" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT" | node -e 'process.stdin.on("data",d=>{const r=JSON.parse(d.toString()); console.log("ok="+r.ok); if(r.ok){console.log("client_id="+r.client_id);console.log("email_sent="+r.email_sent);} else {console.log("errors="+(r.errors||[]).join("; "));}})'

      - name: Comment on failure
        if: steps.gate.outputs.allowed == 'true' && fromJSON(steps.register.outputs.result).ok == false
        uses: actions/github-script@v7
        env:
          RESULT: ${{ steps.register.outputs.result }}
        with:
          script: |
            const result = JSON.parse(process.env.RESULT);
            const errors = (result.errors || []).map(e => `- ${e}`).join("\n");
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
              body: `Cannot register client:\n\n${errors}\n\nEdit the issue to fix and the workflow will retry.`,
            });
            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
              labels: ["invalid"],
            });

      - name: Commit YAML
        if: steps.gate.outputs.allowed == 'true' && fromJSON(steps.register.outputs.result).ok == true
        env:
          RESULT: ${{ steps.register.outputs.result }}
        run: |
          CLIENT_ID="$(echo "$RESULT" | node -e 'process.stdin.on("data",d=>process.stdout.write(JSON.parse(d.toString()).client_id))')"
          YAML_PATH="$(echo "$RESULT" | node -e 'process.stdin.on("data",d=>process.stdout.write(JSON.parse(d.toString()).yaml_path))')"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$YAML_PATH"
          git commit -m "Register client: ${CLIENT_ID}" -m "From issue #${{ github.event.issue.number }}"
          git push

      - name: Comment on success and close
        if: steps.gate.outputs.allowed == 'true' && fromJSON(steps.register.outputs.result).ok == true
        uses: actions/github-script@v7
        env:
          RESULT: ${{ steps.register.outputs.result }}
        with:
          script: |
            const result = JSON.parse(process.env.RESULT);
            const emailLine = result.email_sent
              ? `API key emailed to \`${result.contact_email_masked}\`.`
              : `**API key NOT sent**: ${result.email_reason}. A maintainer must deliver it out-of-band (key is only in this run's logs and gets discarded).`;
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
              body: `Registered client **${result.client_id}**. ${emailLine}`,
            });
            await github.rest.issues.update({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
              state: "closed",
            });
