name: Publish SDK to PyPI

on:
  push:
    tags:
      - "py-v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # for PyPI trusted publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    defaults:
      run:
        working-directory: sdk/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify version matches tag
        if: startsWith(github.ref, 'refs/tags/py-v')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/py-v}"
          PKG_VERSION="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag py-v$TAG_VERSION does not match pyproject.toml version $PKG_VERSION"
            exit 1
          fi
          echo "Publishing badgecollector==$PKG_VERSION"

      - name: Build
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/python/dist
