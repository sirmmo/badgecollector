name: Define a badge

on:
  issues:
    types: [opened, edited, labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  process:
    if: contains(github.event.issue.labels.*.name, 'badge-definition')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write issue body to file
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          mkdir -p .tmp
          printf '%s' "$ISSUE_BODY" > .tmp/issue-body.md

      - name: Parse and generate badge file
        id: generate
        env:
          ISSUE_BODY_PATH: .tmp/issue-body.md
          REPO_ROOT: ${{ github.workspace }}
        run: |
          OUTPUT="$(node .github/scripts/define-badge.mjs)"
          echo "$OUTPUT"
          echo "result<<EOF" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Comment on failure
        if: ${{ fromJSON(steps.generate.outputs.result).ok == false }}
        uses: actions/github-script@v7
        env:
          RESULT: ${{ steps.generate.outputs.result }}
        with:
          script: |
            const result = JSON.parse(process.env.RESULT);
            const errors = (result.errors || []).map(e => `- ${e}`).join("\n");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Cannot generate badge:\n\n${errors}\n\nEdit the issue to fix and the workflow will retry.`,
            });
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ["invalid"],
            });

      - name: Open pull request
        if: ${{ fromJSON(steps.generate.outputs.result).ok == true }}
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ${{ fromJSON(steps.generate.outputs.result).branch }}
          delete-branch: true
          commit-message: |
            Define badge: ${{ fromJSON(steps.generate.outputs.result).id }}

            From issue #${{ github.event.issue.number }}
          title: "Define badge: ${{ fromJSON(steps.generate.outputs.result).id }}"
          body: |
            Generated from issue #${{ github.event.issue.number }} by `${{ github.event.issue.user.login }}`.

            Review the badge definition and merge to add it to the catalog.

            Closes #${{ github.event.issue.number }}
          labels: badge-definition

      - name: Comment with PR link
        if: ${{ fromJSON(steps.generate.outputs.result).ok == true }}
        uses: actions/github-script@v7
        env:
          RESULT: ${{ steps.generate.outputs.result }}
        with:
          script: |
            const result = JSON.parse(process.env.RESULT);
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `PR opened to add **${result.id}** to the catalog. A maintainer will review and merge.`,
            });
