{{ define "main" }}
<article class="page">
  <h1>{{ .Title }}</h1>
  {{ with .Description }}<p class="lede">{{ . }}</p>{{ end }}
  <div class="content">{{ .Content }}</div>
  <ul class="page-list">
    {{ range .Pages }}
    <li><a href="{{ .RelPermalink }}">{{ .Title }}</a>{{ with .Description }} &mdash; {{ . }}{{ end }}</li>
    {{ end }}
  </ul>
</article>
{{ end }}
